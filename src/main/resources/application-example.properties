spring.application.name=Rumour

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/your_db
spring.datasource.username=your_db_name
spring.datasource.password=your_db_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# JWT
jwt.secret=your_secret
jwt.expiration=set_expiration
# 15 minutes (access token)
jwt.refresh-expiration=set_expiration
# 7 days (refresh token)

#Mail (use Gmail SMTP or Mailtrap for dev)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_mail_id
spring.mail.password=16_digit_code
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Scheduler
spring.task.scheduling.enabled=true
## What Each Layer Does


## What Each Layer Does

#| Layer | Responsibility |
#|---|---|
#| `controller` | Handles HTTP/WebSocket requests, calls service |
#| `service` | All business logic lives here |
#| `repository` | Talks to MySQL using JPA |
#| `model` | Maps to your database tables |
#| `dto` | Controls what data goes IN and OUT (hides sensitive fields) |
#| `security` | JWT generation, validation, and Spring Security filter |
#| `scheduler` | Runs background jobs like message cleanup |
#| `config` | App-wide setup (Security, WebSocket, Scheduler) |

---

## Recommended Build Order
```
#1. models          ? map all your tables first
#2. repositories    ? basic JPA interfaces
#3. security        ? JWT + Spring Security (do this early, everything needs auth)
#4. auth            ? register, verify email, login
#5. groups          ? create, join via invite code
#6. messages        ? post rumour, fetch history
#7. websocket       ? real-time chat
#8. reactions       ? emoji on messages
#9. reports/ban     ? safety features
#10. notifications  ? final polish
